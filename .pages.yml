# Pages CMS — схема контента.
# GUI хостится на app.pagescms.org. Чтобы он увидел этот файл:
#   1. Зайти на https://app.pagescms.org/ и залогиниться через GitHub.
#   2. Поставить их GitHub App (Pages CMS) на этот репо.
#   3. Готово — слева появится коллекция «Посты».
#
# Все правки идут commit'ами в main → GitHub Actions пересобирает сайт.

media:
  input: public/images
  output: /images

content:
  - name: posts
    label: Посты
    type: collection
    path: src/content/posts
    format: yaml-frontmatter
    extension: md
    # Имя файла генерится автоматом из времени создания — id руками вводить не нужно.
    filename:
      template: "{year}-{month}-{day}-{hour}{minute}{second}.md"
      field: create
    view:
      primary: title
      fields: [title, category, date]
      sort: [date]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Заголовок (опционально)
        type: string

      - name: body
        label: Текст
        type: rich-text

      - name: category
        label: Категория
        type: select
        required: true
        options:
          values:
            - Новости
            - Текстовые обзоры
            - Видеообзоры
            - Летсплеи
            - Обучалки и туториалы
            - Гайды по классам
            - Инструменты
            - Лор
            - Файлы / принтабли
            - Цены и лоты
            - Прочее

      - name: cover
        label: Обложка (опционально)
        type: image

      - name: tags
        label: Теги (опционально)
        type: string
        list: true
        description: Ключевые слова для группировки и поиска. Например - предзаказ, лавка, кампания. Можно не заполнять.

      - name: sources
        label: Внешние ссылки (опционально)
        type: object
        list: true
        fields:
          - { name: label, label: Подпись, type: string }
          - { name: url, label: URL, type: string }

      - name: telegram_url
        label: Прикреплён файл в Telegram (опционально)
        type: string
        description: Ссылка на пост в Telegram, если к статье прикреплён большой файл, который не лезет в репо (PDF, TTSMOD и т.п.).

      - name: images
        label: Картинки в статье (опционально)
        type: image
        list: true

      # Дата проставляется автоматом из времени создания записи. Pages CMS сам
      # инициализирует date-поле текущим временем при создании, поэтому default
      # тут не нужен — иначе валидация падает с «Please fix the errors before saving».
      - name: date
        label: Дата
        type: date
        hidden: true
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm"
