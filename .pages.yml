# Pages CMS — схема контента.
# GUI хостится на app.pagescms.org. Чтобы он увидел этот файл:
#   1. Зайти на https://app.pagescms.org/ и залогиниться через GitHub.
#   2. Поставить их GitHub App (Pages CMS) на этот репо.
#   3. Готово — слева появится коллекция «Посты».
#
# Все правки идут commit'ами в main → GitHub Actions пересобирает сайт.

media:
  input: public/images
  output: /images

content:
  - name: posts
    label: Посты
    type: collection
    path: src/content/posts
    format: yaml-frontmatter
    extension: md
    filename: "{id}.md"
    view:
      primary: title
      fields: [title, category, date]
      sort: [date]
      default:
        sort: date
        order: desc
    fields:
      - name: id
        label: ID (msg_id из Telegram)
        type: number
        required: true
        description: Уникальный числовой ID. Для постов из Telegram — оригинальный msg_id; для новых придумать любой свободный.

      - name: title
        label: Заголовок
        type: string
        required: true

      - name: date
        label: Дата
        type: date
        required: true
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm:ssXXX"

      - name: author
        label: Автор
        type: string
        required: true

      - name: category
        label: Категория
        type: select
        required: true
        options:
          values:
            - Новости
            - Текстовые обзоры
            - Видеообзоры
            - Летсплеи
            - Обучалки и туториалы
            - Гайды по классам
            - Инструменты
            - Лор
            - Файлы / принтабли
            - Цены и лоты
            - Прочее

      - name: tags
        label: Теги
        type: list
        required: false
        default: []

      - name: sources
        label: Внешние ссылки
        type: list
        required: false
        default: []
        field:
          type: object
          fields:
            - { name: label, label: Подпись, type: string }
            - { name: url, label: URL, type: string }

      - name: telegram_url
        label: URL исходного поста в Telegram
        type: string
        required: true

      - name: images
        label: Картинки
        type: list
        required: false
        default: []
        field:
          type: image

      - name: cover
        label: Обложка
        type: image
        required: false

      - name: media_unavailable
        label: Медиа не выгружено из Telegram (большой файл)
        type: boolean
        default: false

      - name: body
        label: Текст
        type: rich-text
