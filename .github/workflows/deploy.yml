name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  notify-telegram:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write   # чтобы коммитить .telegram-sent.json обратно в репо
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Diff posts (added + modified)
        id: diff
        run: |
          added=$(git diff --diff-filter=A --name-only HEAD^ HEAD -- 'src/content/posts/*.md' | tr '\n' ' ')
          modified=$(git diff --diff-filter=M --name-only HEAD^ HEAD -- 'src/content/posts/*.md' | tr '\n' ' ')
          echo "added=$added" >> $GITHUB_OUTPUT
          echo "modified=$modified" >> $GITHUB_OUTPUT
          echo "Added: $added"
          echo "Modified: $modified"
      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://ramen-necklace.github.io/botse-apocrypha' }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          python .github/scripts/notify_telegram.py \
            --added "${{ steps.diff.outputs.added }}" \
            --modified "${{ steps.diff.outputs.modified }}"
      - name: Commit updated index
        run: |
          if [[ -n "$(git status --porcelain .telegram-sent.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .telegram-sent.json
            git commit -m "chore: update Telegram message-id index [skip-notify]"
            git push
          else
            echo "no changes to .telegram-sent.json"
          fi
